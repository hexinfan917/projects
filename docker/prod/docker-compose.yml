version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: petway-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: petway
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4
    restart: always
    networks:
      - petway-network

  redis:
    image: redis:7-alpine
    container_name: petway-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    restart: always
    networks:
      - petway-network

  user-service:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_NAME: user-service
    image: petway/user-service:latest
    container_name: petway-user-service
    environment:
      - DB_HOST=mysql
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    restart: always
    networks:
      - petway-network

  route-service:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_NAME: route-service
    image: petway/route-service:latest
    container_name: petway-route-service
    environment:
      - DB_HOST=mysql
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    restart: always
    networks:
      - petway-network

  order-service:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_NAME: order-service
    image: petway/order-service:latest
    container_name: petway-order-service
    environment:
      - DB_HOST=mysql
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    restart: always
    networks:
      - petway-network

  gateway:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_NAME: gateway
    image: petway/gateway:latest
    container_name: petway-gateway
    ports:
      - "80:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - user-service
      - route-service
      - order-service
    restart: always
    networks:
      - petway-network

volumes:
  mysql_data:
  redis_data:

networks:
  petway-network:
    driver: bridge
